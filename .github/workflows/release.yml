name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  js:
    name: Build, test, and publish npm package
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.18

      - name: Install dependencies
        run: npm ci

      - name: Install native build tooling
        run: python -m pip install --upgrade meson ninja

      - name: Install browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Build package
        run: npm run build

      - name: Run tests
        run: |
          npm test
          npm run test:browser

      - name: Pack npm artifact
        run: |
          mkdir -p release-artifacts
          npm pack --pack-destination release-artifacts

      - name: Publish to npm
        run: npm publish

      - uses: actions/upload-artifact@v4
        with:
          name: helios-network-npm
          path: release-artifacts/*

  python:
    name: Build Python distributions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build cibuildwheel

      - name: Build sdist
        if: runner.os == 'Linux'
        run: python -m build python --sdist --outdir dist

      - name: Build wheels
        run: python -m cibuildwheel python --output-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: helios-network-python-${{ matrix.os }}
          path: dist/*

  pypi:
    name: Publish Python distributions to PyPI
    runs-on: ubuntu-latest
    needs: python
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: helios-network-python-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  assets:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs: [js, python]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Add checksums
        run: |
          cd release-artifacts
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" release-artifacts/* --clobber
